codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
    after_n_builds: 1

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: 80%
        threshold: 2%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false

ignore:
  - "**/tests/**"
  - "target/**"
