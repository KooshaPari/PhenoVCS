name: Journey Gate
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  journey-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check for manifest files
        run: |
          MANIFESTS=$(find . -name 'manifest.verified.json' 2>/dev/null | wc -l)
          echo "Found $MANIFESTS manifest files"
