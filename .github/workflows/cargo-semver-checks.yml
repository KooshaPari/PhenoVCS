name: cargo-semver-checks

on:
  pull_request:
    paths: ['**/Cargo.toml']
  workflow_dispatch:

jobs:
  semver-checks:
    runs-on: ubuntu-24.04
    # No workspace crates have a crates.io baseline yet; cargo-semver-checks
    # requires a published version. Skip until first crates.io release.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: pheno-tracing
          manifest-path: crates/pheno-tracing/Cargo.toml
