name: cargo-audit
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths: ['Cargo.lock', 'Cargo.toml']
  pull_request:
    paths: ['Cargo.lock', 'Cargo.toml']
  schedule:
    - cron: '37 5 * * 3'
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.1
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}
