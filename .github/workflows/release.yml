name: Release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:

  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      crate:
        description: 'Specific crate to publish (empty = all publishable)'
        required: false

permissions:
  contents: read




timeout-minutes: 20

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${{ inputs.crate }}" ]; then
            cargo publish -p "${{ inputs.crate }}" --no-verify
          else
            for name in $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.publish != []) | .name'); do
              echo "Publishing $name"
              cargo publish -p "$name" --no-verify || echo "  skip $name (likely path-dep or already published)"
            done
          fi

  check-cliff-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check cliff.toml adoption
        run: ./scripts/check-cliff-template.sh
